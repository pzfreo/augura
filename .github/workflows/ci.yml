name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv sync
      - name: ruff (lint)
        run: uv run ruff check .
      - name: ruff (format)
        run: uv run ruff format --check .
      - name: mypy
        run: uv run mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        # build123d is pre-1.0; test against both supported minors.
        build123d: ["0.10.0", "0.11.0"]
        # 0.11 adds Python 3.14 support; 0.10 does not.
        include:
          - python-version: "3.14"
            build123d: "0.11.0"
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --upgrade-package "build123d==${{ matrix.build123d }}"
      - name: pytest (with coverage gate)
        run: uv run pytest
