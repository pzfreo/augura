name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv sync
      - name: ruff (lint)
        run: uv run ruff check .
      - name: ruff (format)
        run: uv run ruff format --check .
      - name: mypy
        run: uv run mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        # build123d is pre-1.0; test against both supported minors.
        build123d: ["0.10.0", "0.11.0"]
        # 0.11 adds Python 3.14 support; 0.10 caps at <3.14.
        include:
          - python-version: "3.14"
            build123d: "0.11.0"
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      # Resolve each leg platform-specifically (like a real `pip install`)
      # rather than via the universal lock: 0.10 pulls cadquery-ocp +
      # cadquery-vtk (cp313 wheels), 0.11 pulls cadquery-ocp-novtk (no vtk).
      # The universal lock can't span both OCP backends across 3.11-3.14.
      - name: Install (pinned build123d)
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install "build123d==${{ matrix.build123d }}" pytest "pytest-cov>=7.1.0" .
      - name: pytest (with coverage gate)
        run: uv run --no-sync pytest
